<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>电脑配置自选系统</title>
    <!-- 引入Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入Font Awesome -->
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.1/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.1/css/v4-shims.min.css" rel="stylesheet">
    <!-- 配置Tailwind自定义颜色 -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#165DFF',
                        secondary: '#36D399',
                        neutral: '#F3F4F6',
                    },
                    fontFamily: {
                        inter: ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .select-shadow {
                box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            }
        }
    </style>
</head>
<body class="font-inter bg-neutral min-h-screen pb-safe">
    <div class="container mx-auto px-4 py-8 max-w-3xl">
        <!-- 头部标题 -->
        <header class="text-center mb-8">
            <h1 class="text-[clamp(1.6rem,4vw,2.5rem)] font-bold text-primary mb-2">电脑配置自选系统</h1>
            <p class="text-gray-600">选择您需要的电脑配件，实时查看总价</p>
        </header>

        <!-- 配置选择区域 -->
        <div class="bg-white rounded-xl shadow-lg p-4 md:p-6 mb-8">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-6">
                <!-- CPU选择 -->
                <div class="space-y-2">
                    <label for="cpu" class="block text-gray-700 font-medium text-sm md:text-base">CPU型号</label>
                    <select id="cpu" class="w-full p-2.5 md:p-3 border border-gray-300 rounded-lg select-shadow focus:outline-none focus:ring-2 focus:ring-primary/50">
                        <option value="">请选择CPU</option>
                    </select>
                </div>

                <!-- 主板选择 -->
                <div class="space-y-2">
                    <label for="motherboard" class="block text-gray-700 font-medium text-sm md:text-base">主板型号</label>
                    <select id="motherboard" class="w-full p-2.5 md:p-3 border border-gray-300 rounded-lg select-shadow focus:outline-none focus:ring-2 focus:ring-primary/50">
                        <option value="">请选择主板</option>
                    </select>
                </div>

                <!-- 内存选择 -->
                <div class="space-y-2">
                    <label for="memory" class="block text-gray-700 font-medium text-sm md:text-base">内存大小</label>
                    <select id="memory" class="w-full p-2.5 md:p-3 border border-gray-300 rounded-lg select-shadow focus:outline-none focus:ring-2 focus:ring-primary/50">
                        <option value="">请选择内存</option>
                    </select>
                </div>

                <!-- 显卡选择 -->
                <div class="space-y-2">
                    <label for="gpu" class="block text-gray-700 font-medium text-sm md:text-base">显卡类型</label>
                    <select id="gpu" class="w-full p-2.5 md:p-3 border border-gray-300 rounded-lg select-shadow focus:outline-none focus:ring-2 focus:ring-primary/50">
                        <option value="">请选择显卡</option>
                    </select>
                </div>

                <!-- 硬盘选择 -->
                <div class="space-y-2">
                    <label for="hard_disk" class="block text-gray-700 font-medium text-sm md:text-base">硬盘大小</label>
                    <select id="hard_disk" class="w-full p-2.5 md:p-3 border border-gray-300 rounded-lg select-shadow focus:outline-none focus:ring-2 focus:ring-primary/50">
                        <option value="">请选择硬盘</option>
                    </select>
                </div>

                <!-- 电源选择 -->
                <div class="space-y-2">
                    <label for="power_supply" class="block text-gray-700 font-medium text-sm md:text-base">电源大小</label>
                    <select id="power_supply" class="w-full p-2.5 md:p-3 border border-gray-300 rounded-lg select-shadow focus:outline-none focus:ring-2 focus:ring-primary/50">
                        <option value="">请选择电源</option>
                    </select>
                </div>

                <!-- 机箱选择 -->
                <div class="space-y-2 md:col-span-2">
                    <label for="case" class="block text-gray-700 font-medium text-sm md:text-base">机箱类型</label>
                    <select id="case" class="w-full p-2.5 md:p-3 border border-gray-300 rounded-lg select-shadow focus:outline-none focus:ring-2 focus:ring-primary/50">
                        <option value="">请选择机箱</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- 价格显示区域 -->
        <div class="bg-white rounded-xl shadow-lg p-4 md:p-6 mb-8 text-center">
            <p class="text-gray-600">配件总价：<span id="parts-price" class="text-gray-800 font-medium">¥0</span></p>
            <p class="text-gray-600">+ 40元（装机+运费+售后）</p>
            <h2 class="text-lg md:text-xl font-bold text-gray-800 mb-2">售价：<span id="total-price" class="text-primary">¥0</span></h2>
        </div>

        <!-- 购买按钮 -->
        <div class="text-center">
            <button id="buy-btn" class="bg-primary hover:bg-primary/90 text-white font-bold py-2.5 px-6 md:py-3 md:px-8 rounded-lg shadow-lg hover:shadow-xl transition-all duration-300 flex items-center justify-center mx-auto min-w-full md:min-w-auto">
                <i class="fa fa-shopping-cart mr-2"></i>
                立即购买
            </button>
        </div>

        <!-- 微信号弹窗 -->
        <div id="wechat-modal" class="fixed inset-0 bg-black/50 flex items-center justify-center hidden z-50">
            <div class="bg-white rounded-xl p-6 md:p-8 max-w-sm w-full mx-2 md:mx-4 text-center">
                <div class="text-primary text-5xl mb-4">
                    <i class="fa fa-wechat"></i>
                </div>
                <h3 class="text-xl font-bold mb-2">联系我们</h3>
                <p class="text-gray-600 mb-4">添加微信咨询购买</p>
                <div class="bg-neutral p-3 rounded-lg font-mono text-lg mb-6">f1915621174</div>
                <button id="close-modal" class="bg-gray-200 hover:bg-gray-300 text-gray-800 font-medium py-2 px-6 rounded-lg transition-colors w-full md:w-auto">
                    关闭
                </button>
            </div>
        </div>
    </div>

    <script>
        // 配置项的DOM元素
        const cpuSelect = document.getElementById('cpu');
        const motherboardSelect = document.getElementById('motherboard');
        const memorySelect = document.getElementById('memory');
        const gpuSelect = document.getElementById('gpu');
        const hardDiskSelect = document.getElementById('hard_disk');
        const powerSupplySelect = document.getElementById('power_supply');
        const caseSelect = document.getElementById('case');
        const totalPriceElement = document.getElementById('total-price');
        const buyBtn = document.getElementById('buy-btn');
        const wechatModal = document.getElementById('wechat-modal');
        const closeModalBtn = document.getElementById('close-modal');

        // 加载配置数据
        async function loadConfig() {
            try {
                const response = await fetch('https://p9-flow-sign.byteimg.com/tos-cn-i-ik7evvg4ik/rc/pc/super_tool/9769d7d6f28c41f4bf3c0aa078b45e07.json?lk3s=8e244e95&rcl=2026031216115543BFC3EF2E4C9EF4E409&rrcfp=f512b60b&x-expires=1774599481&x-signature=A97TNflhLt7LxPmHikdjbO%2FXdFU%3D');
                const config = await response.json();

                // 填充CPU选项
                config.cpu.forEach(item => {
                    const option = document.createElement('option');
                    option.value = item.price;
                    option.textContent = `${item.model} - ¥${item.price}`;
                    cpuSelect.appendChild(option);
                });

                // 填充主板选项
                config.motherboard.forEach(item => {
                    const option = document.createElement('option');
                    option.value = item.price;
                    option.textContent = `${item.model} - ¥${item.price}`;
                    motherboardSelect.appendChild(option);
                });

                // 填充内存选项
                config.memory.forEach(item => {
                    const option = document.createElement('option');
                    option.value = item.price;
                    option.textContent = `${item.model} - ¥${item.price}`;
                    memorySelect.appendChild(option);
                });

                // 填充显卡选项
                config.gpu.forEach(item => {
                    const option = document.createElement('option');
                    option.value = item.price;
                    option.textContent = `${item.model} - ¥${item.price}`;
                    gpuSelect.appendChild(option);
                });

                // 填充硬盘选项
                config.hard_disk.forEach(item => {
                    const option = document.createElement('option');
                    option.value = item.price;
                    option.textContent = `${item.model} - ¥${item.price}`;
                    hardDiskSelect.appendChild(option);
                });

                // 填充电源选项
                config.power_supply.forEach(item => {
                    const option = document.createElement('option');
                    option.value = item.price;
                    option.textContent = `${item.model} - ¥${item.price}`;
                    powerSupplySelect.appendChild(option);
                });

                // 填充机箱选项
                config.case.forEach(item => {
                    const option = document.createElement('option');
                    option.value = item.price;
                    option.textContent = `${item.model} - ¥${item.price}`;
                    caseSelect.appendChild(option);
                });

            } catch (error) {
                console.error('加载配置失败:', error);
                alert('加载配置信息失败，请重试');
            }
        }

        // 计算总价
        function calculateTotal() {
            let partsTotal = 0;

            // 获取每个选择框的选中值，转换为数字
            const cpuPrice = parseFloat(cpuSelect.value) || 0;
            const motherboardPrice = parseFloat(motherboardSelect.value) || 0;
            const memoryPrice = parseFloat(memorySelect.value) || 0;
            const gpuPrice = parseFloat(gpuSelect.value) || 0;
            const hardDiskPrice = parseFloat(hardDiskSelect.value) || 0;
            const powerSupplyPrice = parseFloat(powerSupplySelect.value) || 0;
            const casePrice = parseFloat(caseSelect.value) || 0;

            // 计算配件总价
            partsTotal = cpuPrice + motherboardPrice + memoryPrice + gpuPrice + hardDiskPrice + powerSupplyPrice + casePrice;
            // 计算总售价（配件总价+40元服务费）
            const total = partsTotal + 40;

            // 更新价格显示
            document.getElementById('parts-price').textContent = `¥${partsTotal.toFixed(2)}`;
            totalPriceElement.textContent = `¥${total.toFixed(2)}`;
        }

        // 显示微信号弹窗
        function showWechatModal() {
            wechatModal.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        // 关闭弹窗
        function closeWechatModal() {
            wechatModal.classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        // 初始化
        window.addEventListener('DOMContentLoaded', () => {
            // 加载配置
            loadConfig();

            // 监听所有选择框的变化，计算总价
            [cpuSelect, motherboardSelect, memorySelect, gpuSelect, hardDiskSelect, powerSupplySelect, caseSelect].forEach(select => {
                select.addEventListener('change', calculateTotal);
            });

            // 监听购买按钮点击
            buyBtn.addEventListener('click', showWechatModal);

            // 监听关闭按钮点击
            closeModalBtn.addEventListener('click', closeWechatModal);

            // 点击弹窗外部关闭
            wechatModal.addEventListener('click', (e) => {
                if (e.target === wechatModal) {
                    closeWechatModal();
                }
            });

            // 按ESC键关闭弹窗
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && !wechatModal.classList.contains('hidden')) {
                    closeWechatModal();
                }
            });
        });
    </script>
</body>
</html>
