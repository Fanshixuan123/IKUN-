        // 加载配置数据
        async function loadConfig() {
            try {

                // 填充CPU选项

                // 填充主板选项

                    const option = document.createElement('option');
                    option.value = item.price;
                    option.textContent = `${item.model} - ¥${item.price}`;
                    motherboardSelect.appendChild(option);
                });

                // 填充内存选项
                config.memory.forEach(item => {
                    const option = document.createElement('option');
                    option.value = item.price;
                    option.textContent = `${item.model} - ¥${item.price}`;
                    memorySelect.appendChild(option);
                });

                // 填充显卡选项
                config.gpu.forEach(item => {
                    const option = document.createElement('option');
                    option.value = item.price;
                    option.textContent = `${item.model} - ¥${item.price}`;
                    gpuSelect.appendChild(option);
                });

                // 填充硬盘选项
                config.hard_disk.forEach(item => {
                    const option = document.createElement('option');
                    option.value = item.price;
                    option.textContent = `${item.model} - ¥${item.price}`;
                    hardDiskSelect.appendChild(option);
                });

                // 填充电源选项
                config.power_supply.forEach(item => {
                    const option = document.createElement('option');
                    option.value = item.price;
                    option.textContent = `${item.model} - ¥${item.price}`;
                    powerSupplySelect.appendChild(option);
                });

                // 填充机箱选项
                config.case.forEach(item => {
                    const option = document.createElement('option');
                    option.value = item.price;
                    option.textContent = `${item.model} - ¥${item.price}`;
                    caseSelect.appendChild(option);
                });

                // 设置默认选项
                cpuSelect.value = 80.0;
                motherboardSelect.value = 130.0;
                memorySelect.value = 220.0;
                gpuSelect.value = 0.0;
                hardDiskSelect.value = 70.0;
                powerSupplySelect.value = 30.0;
                caseSelect.value = 30.0;
                // 计算初始总价

        // 加载E3配置数据
        async function loadE3Config() {
            try {
                const response = await fetch('https://p26-flow-sign.byteimg.com/tos-cn-i-ik7evvg4ik/rc/pc/super_tool/75a162905e554cb5ac8f66813ab270ef.json?lk3s=8e244e95&rcl=2026031309041686DA7F2FBC19C517BE02&rrcfp=f512b60b&x-expires=1774659890&x-signature=qR%2FSI%2Bg7F%2F38IV7TcvamM1nL1XE%3D');
                const config = await response.json();

                // 填充CPU选项
                config.cpu.forEach(item => {
                    const option = document.createElement('option');
                    option.value = item.price;
                    option.textContent = `${item.model} - ¥${item.price}`;
                    e3CpuSelect.appendChild(option);
                });

                // 填充主板选项
                config.motherboard.forEach(item => {
                    const option = document.createElement('option');
                    option.value = item.price;
                    option.textContent = `${item.model} - ¥${item.price}`;
                    e3MotherboardSelect.appendChild(option);
                });

                // 填充内存选项
                config.memory.forEach(item => {
                    const option = document.createElement('option');
                    option.value = item.price;
                    option.textContent = `${item.model} - ¥${item.price}`;
                    e3MemorySelect.appendChild(option);
                });

                // 填充显卡选项
                config.gpu.forEach(item => {
                    const option = document.createElement('option');
                    option.value = item.price;
                    option.textContent = `${item.model} - ¥${item.price}`;
                    e3GpuSelect.appendChild(option);
                });

                // 填充硬盘选项
                config.hard_disk.forEach(item => {
                    const option = document.createElement('option');
                    option.value = item.price;
                    option.textContent = `${item.model} - ¥${item.price}`;
                    e3HardDiskSelect.appendChild(option);
                });

                // 填充电源选项
                config.power_supply.forEach(item => {
                    const option = document.createElement('option');
                    option.value = item.price;
                    option.textContent = `${item.model} - ¥${item.price}`;
                    e3PowerSupplySelect.appendChild(option);
                });

                // 填充机箱选项
                config.case.forEach(item => {
                    const option = document.createElement('option');
                    option.value = item.price;
                    option.textContent = `${item.model} - ¥${item.price}`;
                    e3CaseSelect.appendChild(option);
                });

                // 设置默认选项
                // 设置e3v2 + h61的默认配置
                for (let i = 0; i < e3CpuSelect.options.length; i++) {
                    if (e3CpuSelect.options[i].textContent.includes('e3v2')) {
                        e3CpuSelect.value = e3CpuSelect.options[i].value;
                        break;
                    }
                }
                for (let i = 0; i < e3MotherboardSelect.options.length; i++) {
                    if (e3MotherboardSelect.options[i].textContent.includes('h61')) {
                        e3MotherboardSelect.value = e3MotherboardSelect.options[i].value;
                        break;
                    }
                }
                for (let i = 0; i < e3MemorySelect.options.length; i++) {
                    if (e3MemorySelect.options[i].textContent.includes('8g')) {
                        e3MemorySelect.value = e3MemorySelect.options[i].value;
                        break;
                    }
                }
                e3GpuSelect.value = 0.0;
                for (let i = 0; i < e3HardDiskSelect.options.length; i++) {
                    if (e3HardDiskSelect.options[i].textContent.includes('120g')) {
                        e3HardDiskSelect.value = e3HardDiskSelect.options[i].value;
                        break;
                    }
                }
                for (let i = 0; i < e3PowerSupplySelect.options.length; i++) {
                    if (e3PowerSupplySelect.options[i].textContent.includes('300w')) {
                        e3PowerSupplySelect.value = e3PowerSupplySelect.options[i].value;
                        break;
                    }
                }
                for (let i = 0; i < e3CaseSelect.options.length; i++) {
                    if (e3CaseSelect.options[i].textContent.includes('全黑小机箱')) {
                        e3CaseSelect.value = e3CaseSelect.options[i].value;
                        break;
                    }
                }
                // 计算初始总价
                calculateE3Total();

            } catch (error) {
                console.error('加载E3配置失败:', error);
                alert('加载E3配置信息失败，请重试');
            }
        }

        // 计算总价
        function calculateTotal() {
            let partsTotal = 0;

            // 获取每个选择框的选中值，转换为数字
            const cpuPrice = parseFloat(cpuSelect.value) || 0;
            const motherboardPrice = parseFloat(motherboardSelect.value) || 0;
            const memoryPrice = parseFloat(memorySelect.value) || 0;
            const gpuPrice = parseFloat(gpuSelect.value) || 0;
            const hardDiskPrice = parseFloat(hardDiskSelect.value) || 0;
            const powerSupplyPrice = parseFloat(powerSupplySelect.value) || 0;
            const casePrice = parseFloat(caseSelect.value) || 0;

            // 计算配件总价
            partsTotal = cpuPrice + motherboardPrice + memoryPrice + gpuPrice + hardDiskPrice + powerSupplyPrice + casePrice;
            // 计算总售价（配件总价+40元服务费）
            const total = partsTotal + 40;

            // 更新价格显示
            document.getElementById('parts-price').textContent = `¥${partsTotal.toFixed(2)}`;
            totalPriceElement.textContent = `¥${total.toFixed(2)}`;
        }

        // 计算E3配置总价
        function calculateE3Total() {
            let partsTotal = 0;

            // 获取每个选择框的选中值，转换为数字
            const cpuPrice = parseFloat(e3CpuSelect.value) || 0;
            const motherboardPrice = parseFloat(e3MotherboardSelect.value) || 0;
            const memoryPrice = parseFloat(e3MemorySelect.value) || 0;
            const gpuPrice = parseFloat(e3GpuSelect.value) || 0;
            const hardDiskPrice = parseFloat(e3HardDiskSelect.value) || 0;
            const powerSupplyPrice = parseFloat(e3PowerSupplySelect.value) || 0;
            const casePrice = parseFloat(e3CaseSelect.value) || 0;

            // 计算配件总价
            partsTotal = cpuPrice + motherboardPrice + memoryPrice + gpuPrice + hardDiskPrice + powerSupplyPrice + casePrice;
            // 计算总售价（配件总价+40元服务费）
            const total = partsTotal + 40;

            // 更新价格显示
            document.getElementById('e3-parts-price').textContent = `¥${partsTotal.toFixed(2)}`;
            e3TotalPriceElement.textContent = `¥${total.toFixed(2)}`;
        }

        // 显示微信号弹窗
        function showWechatModal() {
            wechatModal.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        // 关闭弹窗
        function closeWechatModal() {
            wechatModal.classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        // 复制配置和价格
        function copyConfig() {
            // 获取各个选中的配置的选项
            const cpuOption = cpuSelect.options[cpuSelect.selectedIndex];
            const motherboardOption = motherboardSelect.options[motherboardSelect.selectedIndex];
            const memoryOption = memorySelect.options[memorySelect.selectedIndex];
            const gpuOption = gpuSelect.options[gpuSelect.selectedIndex];
            const hardDiskOption = hardDiskSelect.options[hardDiskSelect.selectedIndex];
            const powerSupplyOption = powerSupplySelect.options[powerSupplySelect.selectedIndex];
            const caseOption = caseSelect.options[caseSelect.selectedIndex];
            
            // 获取配件总价和总售价
            const partsPrice = document.getElementById('parts-price').textContent;
            const totalPrice = totalPriceElement.textContent;
            
            // 拼接配置文本
            const configText = `电脑配置：
CPU：${cpuOption.textContent}
主板：${motherboardOption.textContent}
内存：${memoryOption.textContent}
显卡：${gpuOption.textContent}
硬盘：${hardDiskOption.textContent}
电源：${powerSupplyOption.textContent}
机箱：${caseOption.textContent}
配件总价：${partsPrice}
+ 40元（装机+运费+售后）
售价：${totalPrice}`;
            
            // 复制到剪贴板
            navigator.clipboard.writeText(configText.trim())
                .then(() => {
                    alert('配置和价格已复制到剪贴板');
                })
                .catch(err => {
                    console.error('复制失败:', err);
                    alert('复制失败，请手动复制');
                });
        }

        // 复制E3配置和价格
        function copyE3Config() {
            // 获取各个选中的配置的选项
            const cpuOption = e3CpuSelect.options[e3CpuSelect.selectedIndex];
            const motherboardOption = e3MotherboardSelect.options[e3MotherboardSelect.selectedIndex];
            const memoryOption = e3MemorySelect.options[e3MemorySelect.selectedIndex];
            const gpuOption = e3GpuSelect.options[e3GpuSelect.selectedIndex];
            const hardDiskOption = e3HardDiskSelect.options[e3HardDiskSelect.selectedIndex];
            const powerSupplyOption = e3PowerSupplySelect.options[e3PowerSupplySelect.selectedIndex];
            const caseOption = e3CaseSelect.options[e3CaseSelect.selectedIndex];
            
            // 获取配件总价和总售价
            const partsPrice = document.getElementById('e3-parts-price').textContent;
            const totalPrice = e3TotalPriceElement.textContent;
            
            // 拼接配置文本
            const configText = `电脑配置：
CPU：${cpuOption.textContent}
主板：${motherboardOption.textContent}
内存：${memoryOption.textContent}
显卡：${gpuOption.textContent}
硬盘：${hardDiskOption.textContent}
电源：${powerSupplyOption.textContent}
机箱：${caseOption.textContent}
配件总价：${partsPrice}
+ 40元（装机+运费+售后）
售价：${totalPrice}`;
            
            // 复制到剪贴板
            navigator.clipboard.writeText(configText.trim())
                .then(() => {
                    alert('配置和价格已复制到剪贴板');
                })
                .catch(err => {
                    console.error('复制失败:', err);
                    alert('复制失败，请手动复制');
                });
        }

        // 检查主板兼容性
        function checkMotherboardCompatibility() {
            const cpuOption = cpuSelect.options[cpuSelect.selectedIndex];
            if (!cpuOption.value) return; // 未选择CPU时不处理
            
            const cpuModel = cpuOption.textContent;
            // 重置所有主板选项的禁用状态
            for (let i = 0; i < motherboardSelect.options.length; i++) {
                motherboardSelect.options[i].disabled = false;
            }
            
            // 判断CPU型号，设置主板禁用状态
            if (cpuModel.includes('v3') || cpuModel.includes('v4')) {
                // v3/v4 CPU不能选x79主板
                for (let i = 0; i < motherboardSelect.options.length; i++) {
                    const mbModel = motherboardSelect.options[i].textContent;
                    if (mbModel.includes('x79')) {
                        motherboardSelect.options[i].disabled = true;
                        // 如果当前选中的是x79，切换到x99
                        if (motherboardSelect.selectedIndex === i) {
                            motherboardSelect.value = 130.0; // x99的价格
                            calculateTotal();
                        }
                    }
                }
            } else if (cpuModel.includes('v2')) {
                // v2 CPU不能选x99主板
                for (let i = 0; i < motherboardSelect.options.length; i++) {
                    const mbModel = motherboardSelect.options[i].textContent;
                    if (mbModel.includes('x99')) {
                        motherboardSelect.options[i].disabled = true;
                        // 如果当前选中的是x99，切换到x79
                        if (motherboardSelect.selectedIndex === i) {
                            motherboardSelect.value = 90.0; // x79的价格
                            calculateTotal();
                        }
                    }
                }
            }
        }

        // 检查E3主板兼容性
        function checkE3MotherboardCompatibility() {
            const cpuOption = e3CpuSelect.options[e3CpuSelect.selectedIndex];
            if (!cpuOption.value) return; // 未选择CPU时不处理
            
            const cpuModel = cpuOption.textContent;
            // 重置所有主板选项的禁用状态
            for (let i = 0; i < e3MotherboardSelect.options.length; i++) {
                e3MotherboardSelect.options[i].disabled = false;
            }
            
            // 判断CPU型号，设置主板禁用状态
            if (cpuModel.includes('v2')) {
                // v2系列CPU只能选h61主板
                for (let i = 0; i < e3MotherboardSelect.options.length; i++) {
                    const mbModel = e3MotherboardSelect.options[i].textContent;
                    if (!mbModel.includes('h61')) {
                        e3MotherboardSelect.options[i].disabled = true;
                        // 如果当前选中的不是h61，切换到h61
                        if (e3MotherboardSelect.selectedIndex === i) {
                            for (let j = 0; j < e3MotherboardSelect.options.length; j++) {
                                if (e3MotherboardSelect.options[j].textContent.includes('h61')) {
                                    e3MotherboardSelect.value = e3MotherboardSelect.options[j].value;
                                    calculateE3Total();
                                    break;
                                }
                            }
                        }
                    }
                }
            } else if (cpuModel.includes('v3')) {
                // v3系列CPU只能选b85主板
                for (let i = 0; i < e3MotherboardSelect.options.length; i++) {
                    const mbModel = e3MotherboardSelect.options[i].textContent;
                    if (!mbModel.includes('b85')) {
                        e3MotherboardSelect.options[i].disabled = true;
                        // 如果当前选中的不是b85，切换到b85
                        if (e3MotherboardSelect.selectedIndex === i) {
                            for (let j = 0; j < e3MotherboardSelect.options.length; j++) {
                                if (e3MotherboardSelect.options[j].textContent.includes('b85')) {
                                    e3MotherboardSelect.value = e3MotherboardSelect.options[j].value;
                                    calculateE3Total();
                                    break;
                                }
                            }
                        }
                    }
                }
            }
        }

        // 切换常见问题弹窗
        function toggleFaqModal() {
            const faqModal = document.getElementById('faq-modal');
            faqModal.classList.toggle('hidden');
        }

        // 切换页面
        function togglePage() {
            if (e5Page.classList.contains('block')) {
                // 切换到E3页面
                e5Page.classList.remove('block');
                e5Page.classList.add('hidden');
                e3Page.classList.remove('hidden');
                e3Page.classList.add('block');
                toggleE3Btn.textContent = '返回E5配置页面';
            } else {
                // 切换到E5页面
                e3Page.classList.remove('block');
                e3Page.classList.add('hidden');
                e5Page.classList.remove('hidden');
                e5Page.classList.add('block');
                toggleE3Btn.textContent = '如需e3或酷睿配置请点此处';
            }
        }

        // 初始化
        window.addEventListener('DOMContentLoaded', () => {
            // 加载配置
            loadConfig();
            // 加载E3配置
            loadE3Config();

            // 监听所有选择框的变化，计算总价
            [cpuSelect, motherboardSelect, memorySelect, gpuSelect, hardDiskSelect, powerSupplySelect, caseSelect].forEach(select => {
                select.addEventListener('change', calculateTotal);
            });

            // 监听E3所有选择框的变化，计算总价
            [e3CpuSelect, e3MotherboardSelect, e3MemorySelect, e3GpuSelect, e3HardDiskSelect, e3PowerSupplySelect, e3CaseSelect].forEach(select => {
                select.addEventListener('change', calculateE3Total);
            });

            // 监听复制按钮点击
            document.getElementById('copy-btn').addEventListener('click', copyConfig);
            // 监听E3复制按钮点击
            document.getElementById('e3-copy-btn').addEventListener('click', copyE3Config);
            
            // 监听CPU选择变化，检查主板兼容性
            cpuSelect.addEventListener('change', () => {
                checkMotherboardCompatibility();
                calculateTotal();
            });
            
            // 监听E3 CPU选择变化，检查主板兼容性
            e3CpuSelect.addEventListener('change', () => {
                checkE3MotherboardCompatibility();
                calculateE3Total();
            });
            
            // 监听常见问题按钮点击
            document.getElementById('faq-btn').addEventListener('click', toggleFaqModal);
            
            // 点击页面其他区域关闭常见问题弹窗
            document.addEventListener('click', (e) => {
                const faqFloat = document.getElementById('faq-float');
                const faqModal = document.getElementById('faq-modal');
                if (!faqFloat.contains(e.target) && !faqModal.classList.contains('hidden')) {
                    faqModal.classList.add('hidden');
                }
            });

            // 监听购买按钮点击
            buyBtn.addEventListener('click', showWechatModal);
            // 监听E3购买按钮点击
            e3BuyBtn.addEventListener('click', () => {
                e3WechatModal.classList.remove('hidden');
                document.body.style.overflow = 'hidden';
            });

            // 监听关闭按钮点击
            closeModalBtn.addEventListener('click', closeWechatModal);
            // 监听E3关闭按钮点击
            e3CloseModalBtn.addEventListener('click', () => {
                e3WechatModal.classList.add('hidden');
                document.body.style.overflow = 'auto';
            });

            // 点击弹窗外部关闭
            wechatModal.addEventListener('click', (e) => {
                if (e.target === wechatModal) {
                    closeWechatModal();
                }
            });
            // 点击E3弹窗外部关闭
            e3WechatModal.addEventListener('click', (e) => {
                if (e.target === e3WechatModal) {
                    e3WechatModal.classList.add('hidden');
                    document.body.style.overflow = 'auto';
                }
            });

            // 按ESC键关闭弹窗
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && !wechatModal.classList.contains('hidden')) {
                    closeWechatModal();
                }
                if (e.key === 'Escape' && !e3WechatModal.classList.contains('hidden')) {
                    e3WechatModal.classList.add('hidden');
                    document.body.style.overflow = 'auto';
                }
            });

            // 监听页面切换按钮点击
            toggleE3Btn.addEventListener('click', togglePage);

            // 页面加载完成后检查初始配置的兼容性
            checkMotherboardCompatibility();
            // 检查E3初始配置的兼容性
            checkE3MotherboardCompatibility();
        });
    </script>
</body>
