<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>电脑配置自助报价 · 商家后台</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        body {
            background: #f2f4f8;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 12px;
        }
        .app-container {
            max-width: 1000px;
            width: 100%;
            background: white;
            border-radius: 32px 32px 24px 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
            padding: 20px 18px 30px;
        }
        h1 {
            font-size: 1.8rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
            color: #1e293b;
            letter-spacing: -0.02em;
            margin-bottom: 6px;
        }
        .sub {
            color: #64748b;
            font-size: 0.9rem;
            margin-bottom: 20px;
            border-left: 4px solid #3b82f6;
            padding-left: 12px;
        }
        .tab-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 25px;
            background: #f1f5f9;
            padding: 6px;
            border-radius: 40px;
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 12px 6px;
            font-weight: 600;
            border-radius: 30px;
            background: transparent;
            border: none;
            font-size: 1rem;
            color: #334155;
            transition: 0.2s;
            cursor: pointer;
        }
        .tab.active {
            background: white;
            color: #1e3a8a;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            font-weight: 700;
        }
        .panel {
            display: none;
            margin-top: 10px;
        }
        .panel.active-panel {
            display: block;
        }
        /* 前台配置卡 */
        .config-grid {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 30px;
        }
        .config-row {
            background: #f8fafc;
            border-radius: 24px;
            padding: 16px 18px;
            border: 1px solid #e2e8f0;
        }
        .label-icon {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
            font-weight: 600;
            color: #0f172a;
            font-size: 1.1rem;
        }
        .label-icon span {
            background: #dbeafe;
            padding: 4px 10px;
            border-radius: 30px;
            font-size: 0.8rem;
            color: #1e40af;
        }
        select {
            width: 100%;
            padding: 15px 18px;
            border-radius: 40px;
            border: 1px solid #cbd5e1;
            background: white;
            font-size: 1rem;
            appearance: none;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="%23334155" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>');
            background-repeat: no-repeat;
            background-position: right 18px center;
            background-size: 18px;
            font-weight: 500;
        }
        .price-tag {
            margin-top: 10px;
            font-size: 1.2rem;
            font-weight: 600;
            color: #0f172a;
            display: flex;
            justify-content: space-between;
            border-top: 1px dashed #cbd5e1;
            padding-top: 14px;
        }
        .total-price {
            background: linear-gradient(145deg, #1e293b, #0f172a);
            color: white;
            padding: 22px 20px;
            border-radius: 28px;
            margin: 25px 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.6rem;
            font-weight: 700;
            box-shadow: 0 6px 14px rgba(0,0,0,0.2);
        }
        .total-price small {
            font-size: 1rem;
            font-weight: 400;
            opacity: 0.8;
        }
        .buy-btn {
            background: #22c55e;
            border: none;
            width: 100%;
            padding: 20px;
            border-radius: 50px;
            color: white;
            font-weight: 700;
            font-size: 1.4rem;
            letter-spacing: 2px;
            box-shadow: 0 8px 0 #15803d;
            transition: 0.1s ease;
            cursor: pointer;
            margin-top: 10px;
            border: 1px solid #16a34a;
        }
        .buy-btn:active {
            transform: translateY(5px);
            box-shadow: 0 3px 0 #15803d;
        }
        /* 后台管理样式 */
        .admin-section {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 24px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.02);
        }
        .admin-section h3 {
            font-size: 1.3rem;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #1e293b;
        }
        .item-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 15px;
        }
        .item-row {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #f1f5f9;
            padding: 8px 12px;
            border-radius: 40px;
            flex-wrap: wrap;
        }
        .item-row input {
            flex: 2 1 120px;
            padding: 10px 16px;
            border: 1px solid #cbd5e1;
            border-radius: 30px;
            font-size: 0.95rem;
            background: white;
        }
        .item-row input.price-input {
            flex: 0 1 90px;
            min-width: 80px;
        }
        .del-btn {
            background: #fee2e2;
            border: none;
            color: #b91c1c;
            width: 44px;
            height: 44px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 1.2rem;
            cursor: pointer;
            border: 1px solid #fecaca;
            transition: 0.1s;
            flex-shrink: 0;
        }
        .del-btn:active {
            background: #fecaca;
        }
        .add-btn {
            background: #e0f2fe;
            border: 1px dashed #0284c7;
            color: #0369a1;
            padding: 12px 18px;
            border-radius: 40px;
            font-weight: 600;
            width: fit-content;
            cursor: pointer;
            margin-top: 6px;
            font-size: 0.95rem;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .contact-row {
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: #f1f5f9;
            border-radius: 26px;
            padding: 20px;
        }
        .contact-field {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .contact-field label {
            font-weight: 600;
            min-width: 70px;
            color: #334155;
        }
        .contact-field input {
            flex: 1;
            padding: 14px 18px;
            border-radius: 40px;
            border: 1px solid #cbd5e1;
            background: white;
            font-size: 1rem;
        }
        .save-admin-btn {
            background: #3b82f6;
            border: none;
            width: 100%;
            padding: 18px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 1.2rem;
            color: white;
            box-shadow: 0 5px 0 #1e3a8a;
            cursor: pointer;
            transition: 0.1s;
            border: 1px solid #2563eb;
            margin-top: 20px;
        }
        .save-admin-btn:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #1e3a8a;
        }
        .logout-btn {
            background: #e2e8f0;
            border: none;
            padding: 12px 20px;
            border-radius: 40px;
            font-weight: 600;
            color: #334155;
            margin-top: 16px;
            width: 100%;
            cursor: pointer;
        }
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
        }
        .modal-active {
            visibility: visible;
            opacity: 1;
        }
        .contact-modal {
            background: white;
            max-width: 360px;
            width: 90%;
            border-radius: 48px;
            padding: 32px 24px;
            text-align: center;
            box-shadow: 0 20px 30px rgba(0,0,0,0.3);
        }
        .contact-modal img {
            max-width: 200px;
            margin: 15px auto;
            border-radius: 24px;
            border: 2px solid #cbd5e1;
        }
        .wechat-badge {
            background: #22c55e;
            color: white;
            padding: 12px 16px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 1.3rem;
            margin: 16px 0;
            word-break: break-word;
        }
        .close-modal {
            background: #e2e8f0;
            border: none;
            padding: 14px 20px;
            border-radius: 30px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
        }
        .footer-note {
            text-align: center;
            color: #94a3b8;
            font-size: 0.8rem;
            margin-top: 30px;
        }
    </style>
</head>
<body>
<div class="app-container" id="appContainer">
    <h1>⚙️ 极客选配</h1>
    <div class="sub">点击下方选项卡 · 商家后台需密码</div>

    <!-- 选项卡 -->
    <div class="tab-bar">
        <button class="tab active" id="tabFront">🛒 顾客配置</button>
        <button class="tab" id="tabAdmin">🔐 管理后台</button>
    </div>

    <!-- 顾客前台面板 -->
    <div id="frontPanel" class="panel active-panel">
        <div class="config-grid" id="frontSelectors">
            <!-- 动态生成下拉框 -->
        </div>
        <div class="total-price" id="totalPriceDisplay">
            <span>预估总价</span>
            <span id="totalValue">0</span>
        </div>
        <button class="buy-btn" id="buyNowBtn">立即购买</button>
        <div style="font-size:0.9rem; color:#475569; margin-top:16px; text-align:center;">✅ 所有配置均已包含 ¥50 手工费+运费+售后</div>
    </div>

    <!-- 后台管理面板 (密码保护) -->
    <div id="adminPanel" class="panel">
        <div id="adminLocked" style="text-align: center; padding: 40px 20px;">
            <p style="margin-bottom: 24px; font-size: 1.2rem;">🔒 请输入后台密码</p>
            <input type="password" id="passwordInput" placeholder="密码" style="width:80%; padding:16px; border-radius:60px; border:1px solid #cbd5e1; font-size:1.1rem;">
            <button id="unlockBtn" style="margin-top:20px; background:#3b82f6; color:white; border:none; padding:16px 30px; border-radius:60px; font-weight:600;">解锁</button>
        </div>
        <div id="adminContent" style="display: none;">
            <!-- 后台内容由JS渲染 -->
        </div>
    </div>
    <div class="footer-note">长按或长截图 发送给客户</div>
</div>

<!-- 联系方式弹窗 -->
<div class="modal-overlay" id="contactModal">
    <div class="contact-modal">
        <h3 style="margin-bottom: 10px;">📞 联系商家</h3>
        <div id="modalWechat">微信号: loading...</div>
        <div id="modalQrContainer"><!-- 二维码图片 --></div>
        <button class="close-modal" id="closeModalBtn">关闭</button>
    </div>
</div>

<script>
(function() {
    // ---------- 默认初始数据 (基于excel表格) ----------
    const DEFAULT_DATA = {
        cpu: [
            { name: "2666v3", price: 140 },
            { name: "2673v3", price: 80 },
            { name: "1650v2", price: 50 },
            { name: "2696v2", price: 60 }
        ],
        motherboard: [
            { name: "x99", price: 130 },
            { name: "x79", price: 130 }
        ],
        memory: [
            { name: "16GB (8+8)", price: 240 },
            { name: "32GB (16+16)", price: 520 }
        ],
        gpu: [
            { name: "gtx650", price: 110 },
            { name: "gtx750", price: 160 },
            { name: "gtx750ti", price: 225 },
            { name: "gtx960", price: 260 },
            { name: "rx460", price: 230 },
            { name: "rx560", price: 240 },
            { name: "r9 380", price: 260 }
        ],
        storage: [
            { name: "120G 固态", price: 70 },
            { name: "240G 固态", price: 150 },
            { name: "500G 机械", price: 260 }
        ],
        power: [
            { name: "300W", price: 30 },
            { name: "400W", price: 55 },
            { name: "500W", price: 80 },
            { name: "600W", price: 105 }
        ],
        case: [
            { name: "全黑小机箱", price: 30 },
            { name: "全黑大机箱", price: 50 },
            { name: "海景房 (运费到付)", price: 80 }
        ],
        contact: {
            wechat: "DIY_电脑店",
            qrUrl: ""   // 可留空, 仅展示微信号
        }
    };

    // ---------- 全局状态 ----------
    let appData = JSON.parse(JSON.stringify(DEFAULT_DATA)); // 当前内存数据
    let isAdminLoggedIn = false;          // 后台是否解锁

    // 加载本地存储数据
    function loadFromStorage() {
        const stored = localStorage.getItem('pc_config_admin');
        if (stored) {
            try {
                const parsed = JSON.parse(stored);
                // 简单合并，确保contact存在
                if (parsed) appData = parsed;
                if (!appData.contact) appData.contact = { wechat: '', qrUrl: '' };
            } catch (e) {}
        } else {
            // 首次使用保存默认
            saveToStorage();
        }
    }
    function saveToStorage() {
        localStorage.setItem('pc_config_admin', JSON.stringify(appData));
    }

    // 初始化
    loadFromStorage();

    // 获取DOM元素
    const frontPanel = document.getElementById('frontPanel');
    const adminPanel = document.getElementById('adminPanel');
    const tabFront = document.getElementById('tabFront');
    const tabAdmin = document.getElementById('tabAdmin');
    const frontSelectors = document.getElementById('frontSelectors');
    const totalSpan = document.getElementById('totalValue');
    const buyBtn = document.getElementById('buyNowBtn');
    const modalOverlay = document.getElementById('contactModal');
    const modalWechat = document.getElementById('modalWechat');
    const modalQr = document.getElementById('modalQrContainer');
    const closeModal = document.getElementById('closeModalBtn');
    const adminLockedDiv = document.getElementById('adminLocked');
    const adminContentDiv = document.getElementById('adminContent');
    const passwordInput = document.getElementById('passwordInput');
    const unlockBtn = document.getElementById('unlockBtn');

    // 辅助函数: 更新所有下拉列表 (前台)
    function renderFront() {
        let html = '';
        const categories = [
            { key: 'cpu', label: 'CPU' },
            { key: 'motherboard', label: '主板' },
            { key: 'memory', label: '内存' },
            { key: 'gpu', label: '显卡' },
            { key: 'storage', label: '硬盘' },
            { key: 'power', label: '电源' },
            { key: 'case', label: '机箱' }
        ];
        categories.forEach(cat => {
            const items = appData[cat.key] || [];
            html += `<div class="config-row"><div class="label-icon">🖥️ ${cat.label} <span>可选${items.length}</span></div>`;
            html += `<select id="select-${cat.key}" class="part-select" data-category="${cat.key}">`;
            items.forEach(item => {
                const displayName = item.name + ' · ¥' + item.price;
                html += `<option value="${item.name}" data-price="${item.price}">${displayName}</option>`;
            });
            html += `</select></div>`;
        });
        frontSelectors.innerHTML = html;

        // 重新绑定事件计算总价
        document.querySelectorAll('.part-select').forEach(sel => {
            sel.addEventListener('change', updateTotalPrice);
        });
        updateTotalPrice();
    }

    // 计算总价并显示
    function updateTotalPrice() {
        let total = 50; // 固定手工费运费售后
        document.querySelectorAll('.part-select').forEach(sel => {
            const selected = sel.options[sel.selectedIndex];
            if (selected) {
                const price = selected.getAttribute('data-price');
                total += Number(price) || 0;
            }
        });
        totalSpan.innerText = '¥' + total;
    }

    // 渲染后台管理 (需要已解锁)
    function renderAdmin() {
        if (!isAdminLoggedIn) return;
        let adminHtml = '<div class="admin-section"><h3>📦 编辑配件库</h3>';

        // 分类列表 (与前台一致)
        const categories = [
            { key: 'cpu', label: 'CPU' },
            { key: 'motherboard', label: '主板' },
            { key: 'memory', label: '内存' },
            { key: 'gpu', label: '显卡' },
            { key: 'storage', label: '硬盘' },
            { key: 'power', label: '电源' },
            { key: 'case', label: '机箱' }
        ];

        categories.forEach(cat => {
            const items = appData[cat.key] || [];
            adminHtml += `<div style="margin-bottom: 28px;"><h4 style="margin-bottom:10px;">🔹 ${cat.label}</h4>`;
            adminHtml += `<div class="item-list" id="list-${cat.key}">`;

            items.forEach((item, idx) => {
                adminHtml += `<div class="item-row" data-category="${cat.key}" data-index="${idx}">`;
                adminHtml += `<input type="text" class="admin-input-name" value="${item.name.replace(/"/g, '&quot;')}" placeholder="名称" data-category="${cat.key}" data-index="${idx}" data-field="name">`;
                adminHtml += `<input type="number" class="admin-input-price" value="${item.price}" placeholder="价格" data-category="${cat.key}" data-index="${idx}" data-field="price" min="0" step="1">`;
                adminHtml += `<button class="del-btn" data-category="${cat.key}" data-index="${idx}">✕</button>`;
                adminHtml += `</div>`;
            });

            adminHtml += `</div>`;
            adminHtml += `<button class="add-btn" data-category="${cat.key}">➕ 添加新${cat.label}</button>`;
            adminHtml += `</div>`;
        });

        // 联系方式区域
        adminHtml += `<div class="admin-section"><h3>📱 联系方式 (点击购买弹窗)</h3>`;
        adminHtml += `<div class="contact-row">`;
        adminHtml += `<div class="contact-field"><label>微信号</label><input type="text" id="adminWechat" value="${appData.contact.wechat || ''}" placeholder="如: DIY_123"></div>`;
        adminHtml += `<div class="contact-field"><label>二维码URL</label><input type="text" id="adminQrUrl" value="${appData.contact.qrUrl || ''}" placeholder="https://... 或留空"></div>`;
        adminHtml += `</div>`;

        // 保存按钮 & 退出登录
        adminHtml += `<button class="save-admin-btn" id="saveAdminBtn">💾 保存所有修改到手机</button>`;
        adminHtml += `<button class="logout-btn" id="logoutAdminBtn">🔒 退出后台</button>`;
        adminHtml += `</div>`;

        adminContentDiv.innerHTML = adminHtml;

        // 绑定删除按钮事件
        document.querySelectorAll('.del-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const category = btn.dataset.category;
                const index = btn.dataset.index;
                if (!category || index === undefined) return;
                // 先同步当前所有输入框的值到内存 (以免丢失编辑)
                syncInputsToAppData();
                // 执行删除
                if (appData[category] && appData[category][index]) {
                    appData[category].splice(index, 1);
                }
                // 重新渲染后台并保存到存储 (但尚未写入localStorage, 用户需点保存)
                renderAdmin();
            });
        });

        // 绑定添加按钮
        document.querySelectorAll('.add-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const category = btn.dataset.category;
                if (!category) return;
                syncInputsToAppData();   // 同步已编辑内容
                // 添加默认项
                if (!appData[category]) appData[category] = [];
                appData[category].push({ name: '新选项', price: 0 });
                renderAdmin();  // 刷新
            });
        });

        // 绑定输入框修改事件 (实时更新内存, 同时保证输入框可见)
        document.querySelectorAll('.admin-input-name, .admin-input-price').forEach(input => {
            input.addEventListener('change', function(e) {
                const cat = this.dataset.category;
                const idx = this.dataset.index;
                const field = this.dataset.field;
                if (!cat || idx === undefined) return;
                let value = this.value;
                if (field === 'price') value = Number(value) || 0;
                if (appData[cat] && appData[cat][idx]) {
                    appData[cat][idx][field] = value;
                }
            });
            // 针对手机优化，也可以用blur
            input.addEventListener('blur', function() {
                const cat = this.dataset.category;
                const idx = this.dataset.index;
                const field = this.dataset.field;
                if (!cat || idx === undefined) return;
                let value = this.value;
                if (field === 'price') value = Number(value) || 0;
                if (appData[cat] && appData[cat][idx]) {
                    appData[cat][idx][field] = value;
                }
            });
        });

        // 保存按钮
        document.getElementById('saveAdminBtn')?.addEventListener('click', function() {
            // 先把所有输入框同步一次
            syncInputsToAppData();
            // 获取联系方式
            const wechatInput = document.getElementById('adminWechat');
            const qrInput = document.getElementById('adminQrUrl');
            if (wechatInput) appData.contact.wechat = wechatInput.value;
            if (qrInput) appData.contact.qrUrl = qrInput.value;

            saveToStorage();
            alert('✅ 配置已保存至本地');
            // 刷新前台价格选项
            renderFront();
        });

        // 退出登录
        document.getElementById('logoutAdminBtn')?.addEventListener('click', function() {
            isAdminLoggedIn = false;
            adminLockedDiv.style.display = 'block';
            adminContentDiv.style.display = 'none';
            tabFront.click();  // 切换到前台
        });

        // 同步一次联系方式显示
    }

    // 同步所有可见输入框到appData (用于添加/删除前保证数据)
    function syncInputsToAppData() {
        document.querySelectorAll('.admin-input-name').forEach(inp => {
            const cat = inp.dataset.category;
            const idx = inp.dataset.index;
            if (cat && idx !== undefined && appData[cat] && appData[cat][idx]) {
                appData[cat][idx].name = inp.value;
            }
        });
        document.querySelectorAll('.admin-input-price').forEach(inp => {
            const cat = inp.dataset.category;
            const idx = inp.dataset.index;
            if (cat && idx !== undefined && appData[cat] && appData[cat][idx]) {
                appData[cat][idx].price = Number(inp.value) || 0;
            }
        });
    }

    // 切换面板
    function switchTab(panel) {
        if (panel === 'front') {
            frontPanel.classList.add('active-panel');
            adminPanel.classList.remove('active-panel');
            tabFront.classList.add('active');
            tabAdmin.classList.remove('active');
        } else {
            frontPanel.classList.remove('active-panel');
            adminPanel.classList.add('active-panel');
            tabFront.classList.remove('active');
            tabAdmin.classList.add('active');

            if (!isAdminLoggedIn) {
                adminLockedDiv.style.display = 'block';
                adminContentDiv.style.display = 'none';
            } else {
                adminLockedDiv.style.display = 'none';
                adminContentDiv.style.display = 'block';
                renderAdmin();   // 每次进入后台重新渲染
            }
        }
    }

    // 事件绑定: 选项卡
    tabFront.addEventListener('click', () => switchTab('front'));
    tabAdmin.addEventListener('click', () => switchTab('admin'));

    // 解锁后台
    unlockBtn.addEventListener('click', () => {
        const pwd = passwordInput.value;
        if (pwd === '123456') {
            isAdminLoggedIn = true;
            adminLockedDiv.style.display = 'none';
            adminContentDiv.style.display = 'block';
            renderAdmin();
            passwordInput.value = '';
        } else {
            alert('密码错误 (123456)');
        }
    });

    // 立即购买弹窗
    buyBtn.addEventListener('click', () => {
        const wechat = appData.contact.wechat || '未设置微信号';
        const qrUrl = appData.contact.qrUrl || '';
        modalWechat.innerText = '微信号：' + wechat;
        let qrHtml = '';
        if (qrUrl) {
            qrHtml = `<img src="${qrUrl}" alt="二维码" style="max-width:180px; border-radius:18px; margin:10px 0;" onerror="this.style.display='none';">`;
        } else {
            qrHtml = '<div style="background:#e2e8f0; padding:16px; border-radius:24px; color:#334155; margin:12px 0;">📸 商家未上传二维码</div>';
        }
        modalQr.innerHTML = qrHtml;
        modalOverlay.classList.add('modal-active');
    });

    closeModal.addEventListener('click', () => {
        modalOverlay.classList.remove('modal-active');
    });
    modalOverlay.addEventListener('click', (e) => {
        if (e.target === modalOverlay) modalOverlay.classList.remove('modal-active');
    });

    // 初始渲染前台
    renderFront();

    // 如果已登录状态刷新页面，可保持后台显示，但默认前台
    // 无额外操作

    // 暴露手动同步用
    window.syncInputs = syncInputsToAppData; // debug

})();
</script>
</body>
</html>
